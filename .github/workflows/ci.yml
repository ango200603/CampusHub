name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Backend and frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/campus-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/campus-web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        working-directory: frontend/campus-web
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8080
        run: npm run build
